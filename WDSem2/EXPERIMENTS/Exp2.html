
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UniStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body
    {background:#f4f6f9;
        font-family:sans-serif}

.navbar,footer{background:#111827}

.card{border:0;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 10px #0001;
    transition:.3s}

.card:hover{
    transform:translateY(-5px)}
.card img{height:220px;
    object-fit:cover}
.price{color:green;
    font-weight:bold}
.btn{border-radius:8px}
footer{color:#fff;
    padding:12px;
    margin-top:40px;
    text-align:center}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold" href="#">UniStore</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#">Products</a></li>
<li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
</ul>
</div>
</div>
</nav>

<div class="container py-5">
<div class="row g-4">

<div class="col-md-4">
<div class="card">
<img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=800&auto=format&fit=crop">
<div class="card-body text-center">
<h5>Apple MacBook</h5>
<p class="text-muted">M3 Performance Laptop</p>
<span class="badge bg-success">In Stock</span>
<p class="price mt-2">₹1,20,000</p>
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#m">View Details</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=800&auto=format&fit=crop">
<div class="card-body text-center">
<h5>iPhone 15</h5>
<p class="text-muted">Apple Smartphone</p>
<span class="badge bg-warning text-dark">Limited</span>
<p class="price mt-2">₹79,999</p>
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#m">View Details</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=800&auto=format&fit=crop">
<div class="card-body text-center">
<h5>Sony WH-1000XM5</h5>
<p class="text-muted">Noise Cancelling</p>
<span class="badge bg-info">New</span>
<p class="price mt-2">₹24,999</p>
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#m">View Details</button>
</div>
</div>
</div>

</div>
</div>

<!-- Modal -->

<div class="modal fade" id="m">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Product Details</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
Premium product with modern design and powerful performance.
</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
</div>

</div>
</div>
</div>


<footer>
© 2026 UniStore
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
