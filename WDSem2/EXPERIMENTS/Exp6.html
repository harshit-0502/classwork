<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Content Changer</title>
    <link rel="stylesheet" href="Exp6.css">
</head>
<body>

    <h1 id="heading">Welcome to my page </h1>

    <input type="text" id="inputText" placeholder="Enter your message">

    <br><br>

    <button id="btnReset">Reset</button>

    <p id="para">This is a sample paragraph.</p>

    <script src="Exp6.js"></script>

</body>
</html>
