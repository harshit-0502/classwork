<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            padding:20px;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            width:100%;
            max-width:400px;
            text-align:center;
        }

        h1{
            margin-bottom:20px;
            color:#333;
        }

        input, select{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#4facfe;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            transition:0.3s;
        }

        button:hover{
            background:#2196f3;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
            color:#333;
        }

        @media(max-width:480px){
            .container{
                padding:20px;
            }

            h1{
                font-size:24px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌡 Temperature Converter</h1>

    <input type="number" id="temp" placeholder="Enter Temperature">

    <select id="conversion">
        <option value="cToF">Celsius → Fahrenheit</option>
        <option value="fToC">Fahrenheit → Celsius</option>
    </select>

    <button onclick="convertTemp()">Convert</button>

    <div id="result"></div>
</div>

<script>
function convertTemp() {
    let temp = parseFloat(document.getElementById("temp").value);
    let conversion = document.getElementById("conversion").value;
    let result = document.getElementById("result");

    if (isNaN(temp)) {
        result.innerHTML = "Please enter a valid temperature!";
        return;
    }

    let converted;

    if (conversion === "cToF") {
        converted = (temp * 9/5) + 32;
        result.innerHTML = `${temp} °C = ${converted.toFixed(2)} °F`;
    } else {
        converted = (temp - 32) * 5/9;
        result.innerHTML = `${temp} °F = ${converted.toFixed(2)} °C`;
    }
}
</script>

</body>
</html>
